<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error de carga</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin-bottom: 10px;
            color: #ff4b5c;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #ff4b5c;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>⚠</h1>
        <h2>Error de carga</h2>
        <p>
            La página no se pudo cargar correctamente.<br>
            Puede estar en mantenimiento, actualización o temporalmente caída.
        </p>

        <div class="loader"></div>

        <div class="footer">
            Intenta nuevamente más tarde...
        </div>
    </div>

</body>
</html>
